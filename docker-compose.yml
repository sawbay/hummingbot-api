services:
  hummingbot-api:
    container_name: hummingbot-api
    image: ghcr.io/sawbay/hummingbot-api:latest
    build:
        context: .
    ports:
      - "8000:8000"
    volumes:
      - ./bots:/hummingbot-api/bots
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      # Override specific values for Docker networking
      - DATABASE_URL=postgresql+asyncpg://hbot:hummingbot-api@postgres:5432/hummingbot_api
      - GATEWAY_URL=http://host.docker.internal:15888
    extra_hosts:
      # Map host.docker.internal to host gateway for Linux compatibility
      # On macOS/Windows, Docker Desktop provides this automatically
      # On Linux, this maps to the docker bridge gateway IP
      - "host.docker.internal:host-gateway"
    networks:
      - emqx-bridge
    depends_on:
      - postgres
      - emqx

  rs-orchestrator:
    container_name: rs-orchestrator
    image: ghcr.io/sawbay/rs-orchestrator:latest
    # build:
    #   context: ./rs-orchestrator
    ports:
      - "8001:8001"
    volumes:
      - ./bots:/app/bots
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./rs-orchestrator/.env
    networks:
      - emqx-bridge
    depends_on:
      - postgres
      - emqx

  emqx:
    container_name: hummingbot-emqx
    image: emqx:5
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "18083:18083"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    container_name: hummingbot-postgres
    image: postgres:16
    restart: unless-stopped
    cpus: "0.25"
    mem_limit: 256m
    mem_reservation: 128m
    environment:
      # These variables automatically create the user and database on first initialization
      - POSTGRES_DB=hummingbot_api
      - POSTGRES_USER=hbot
      - POSTGRES_PASSWORD=hummingbot-api
      # Additional init parameters for better compatibility
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init script as safety net - only runs on first initialization
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - emqx-bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbot -d hummingbot_api"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  emqx-bridge:
    driver: bridge

volumes:
  postgres-data: { }
